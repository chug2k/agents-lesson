# Fast Track — one domain, three tracks.
#   /            hub (static)
#   /agents/     agents lesson (static, baked into this image)
#   /vibecoding/ proxied to the vibecoding-lectures swarm service (strip prefix)
#   /skills/     proxied to the skills-series compose web container (Next basePath /skills)
# Old hosts 301 into their new paths. Docker's embedded DNS + variables keep nginx
# booting even if an upstream is down (errors stay per-request).

server {
    listen 80 default_server;
    server_name ai-learning.anduincapital.dev _;
    root /usr/share/nginx/html;
    resolver 127.0.0.11 valid=10s;

    location = /vibecoding { return 301 /vibecoding/; }
    location /vibecoding/ {
        set $vibe_upstream app-input-back-end-monitor-ak9tq3;
        rewrite ^/vibecoding/(.*)$ /$1 break;
        proxy_pass http://$vibe_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /skills { return 301 /skills/; }
    location /skills/ {
        set $skills_upstream compose-quantify-auxiliary-transmitter-7c9921-web-1;
        proxy_pass http://$skills_upstream:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name vibecoding-lectures.anduincapital.dev;
    return 301 https://ai-learning.anduincapital.dev/vibecoding$request_uri;
}

server {
    listen 80;
    server_name skills.anduincapital.dev;
    return 301 https://ai-learning.anduincapital.dev/skills$request_uri;
}
